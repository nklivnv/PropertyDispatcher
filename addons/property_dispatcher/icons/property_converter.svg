			<rect width="32" height="32" fill="#fff" />
			<line x1="0" y1="10" x2="16" y2="10" stroke="black" stroke-width="4" />
			<line x1="16" y1="22" x2="32" y2="22" stroke="black" stroke-width="4" />
		</mask>
	</defs>

	<g mask="url(#cut)">
