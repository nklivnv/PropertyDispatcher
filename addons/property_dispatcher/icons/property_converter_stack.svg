<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
	<defs>
		<mask id="cut" maskUnits="userSpaceOnUse">
			<rect width="32" height="32" fill="#fff" />
			<line x1="16" y1="0" x2="16" y2="32" stroke="black" stroke-width="10" />
		</mask>
	</defs>

	<g mask="url(#cut)">
		<circle cx="16" cy="16" r="10" fill="none" stroke="#fff" stroke-width="4" />
	</g>

	<line x1="16" y1="6" x2="16" y2="26" stroke="#fff" stroke-width="4" stroke-linecap="round" />
	<circle cx="16" cy="16" r="4" fill="#fff" />
</svg>


